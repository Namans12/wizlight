<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WizLight Video Sync</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 16px;
      text-align: center;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .header .subtitle {
      font-size: 12px;
      opacity: 0.8;
    }

    .content {
      padding: 16px;
    }

    .status-section {
      background: #16213e;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
    }

    .status-row:not(:last-child) {
      border-bottom: 1px solid #1a1a2e;
    }

    .status-label {
      font-size: 13px;
      color: #aaa;
    }

    .status-value {
      font-size: 13px;
      font-weight: 500;
    }

    .status-indicator {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }

    .status-indicator.connected {
      background: #4ade80;
      box-shadow: 0 0 8px #4ade80;
    }

    .status-indicator.disconnected {
      background: #f87171;
    }

    .color-preview {
      width: 24px;
      height: 24px;
      border-radius: 4px;
      border: 2px solid #333;
    }

    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .btn {
      flex: 1;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-secondary {
      background: #16213e;
      color: #eee;
    }

    .btn-secondary:hover {
      background: #1f3460;
    }

    .settings-section {
      background: #16213e;
      border-radius: 8px;
      padding: 12px;
    }

    .settings-section h3 {
      font-size: 14px;
      margin-bottom: 12px;
      color: #aaa;
    }

    .setting-row {
      margin-bottom: 12px;
    }

    .setting-row:last-child {
      margin-bottom: 0;
    }

    .setting-label {
      font-size: 12px;
      color: #888;
      margin-bottom: 4px;
    }

    .setting-row input[type="text"],
    .setting-row input[type="number"] {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #1a1a2e;
      color: #eee;
      font-size: 13px;
    }

    .setting-row input:focus {
      outline: none;
      border-color: #667eea;
    }

    .setting-row input[type="range"] {
      width: 100%;
      margin-top: 4px;
    }

    .range-value {
      float: right;
      font-size: 12px;
      color: #667eea;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .checkbox-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #667eea;
    }

    .footer {
      padding: 12px 16px;
      text-align: center;
      font-size: 11px;
      color: #666;
      border-top: 1px solid #16213e;
    }

    .footer a {
      color: #667eea;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>💡 WizLight Video Sync</h1>
    <div class="subtitle">Sync your lights with video content</div>
  </div>

  <div class="content">
    <!-- Status Section -->
    <div class="status-section">
      <div class="status-row">
        <span class="status-label">Server Connection</span>
        <span class="status-value">
          <span id="connectionIndicator" class="status-indicator disconnected"></span>
          <span id="connectionStatus">Disconnected</span>
        </span>
      </div>
      <div class="status-row">
        <span class="status-label">Video Detected</span>
        <span id="videoStatus" class="status-value">No</span>
      </div>
      <div class="status-row">
        <span class="status-label">Current Color</span>
        <div id="colorPreview" class="color-preview" style="background: #333;"></div>
      </div>
    </div>

    <!-- Control Buttons -->
    <div class="controls">
      <button id="toggleBtn" class="btn btn-primary">Start Sync</button>
      <button id="connectBtn" class="btn btn-secondary">Connect</button>
    </div>

    <!-- Settings Section -->
    <div class="settings-section">
      <h3>⚙️ Settings</h3>
      
      <div class="setting-row">
        <div class="setting-label">Server URL</div>
        <input type="text" id="serverUrl" value="ws://localhost:38901" placeholder="ws://localhost:38901">
      </div>

      <div class="setting-row">
        <div class="setting-label">
          Frame Rate (FPS)
          <span id="fpsValue" class="range-value">12</span>
        </div>
        <input type="range" id="fpsSlider" min="4" max="30" value="12">
      </div>

      <div class="setting-row">
        <div class="setting-label">
          Color Boost
          <span id="boostValue" class="range-value">1.15</span>
        </div>
        <input type="range" id="boostSlider" min="100" max="200" value="115">
      </div>

      <div class="setting-row checkbox-row">
        <input type="checkbox" id="autoStart">
        <label for="autoStart" class="setting-label">Auto-start on video pages</label>
      </div>

      <div class="setting-row checkbox-row">
        <input type="checkbox" id="autoConnect" checked>
        <label for="autoConnect" class="setting-label">Auto-connect to server</label>
      </div>
    </div>
  </div>

  <div class="footer">
    Run <code>wizlight serve</code> to start the server
  </div>

  <script src="popup.js"></script>
</body>
</html>
